name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deny-list tracker (policy zero-tracker verificabile)
        run: ./tool/check_denylist.sh

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.32.x"
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze 
      - run: flutter test
