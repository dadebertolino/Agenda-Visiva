name: agenda_visiva
description: >-
  Agende visive per bambini autistici e con svantaggio linguistico.
  Gratuita per sempre. Offline-first, zero tracker.
publish_to: none
version: 1.1.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Persistenza
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.4

  # Modelli
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.0
  crypto: ^3.0.5

  # Navigazione
  go_router: ^14.2.0

  # ARASAAC + media
  http: ^1.2.2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # Export
  pdf: ^3.11.1
  printing: ^5.13.2
  qr_flutter: ^4.1.0
  archive: ^3.6.1
  share_plus: ^10.0.0
  file_picker: ^8.1.2

  # Accessibilità
  flutter_tts: ^4.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.20.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/pictograms/builtin/
    - assets/branding/

flutter_native_splash:
  color: "#00897B"
  image: assets/branding/splash_icon.png
  android_12:
    color: "#00897B"
    image: assets/branding/splash_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/icon_fullbleed.png
  remove_alpha_ios: true
  adaptive_icon_background: "#00897B"
  adaptive_icon_foreground: assets/branding/icon_adaptive_fg.png
